services:
  namenode:
    image: apache/hadoop:3.3.6
    container_name: namenode
    hostname: namenode
    networks:
      - hadoop-net
    ports:
      - "9870:9870"
      - "9000:9000"
      - "8020:8020"
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./data:/data
      - namenode_data:/opt/hadoop/data/namenode
    environment:
      - HADOOP_HOME=/opt/hadoop
    command: >
      bash -c "
        mkdir -p /opt/hadoop/data/namenode &&
        hdfs namenode -format -force -nonInteractive 2>/dev/null || true &&
        hdfs namenode
      "

  datanode1:
    image: apache/hadoop:3.3.6
    container_name: datanode1
    hostname: datanode1
    networks:
      - hadoop-net
    ports:
      - "9864:9864"
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - datanode1_data:/opt/hadoop/data/datanode
    environment:
      - HADOOP_HOME=/opt/hadoop
    depends_on:
      - namenode
    command: >
      bash -c "
        sleep 30 &&
        mkdir -p /opt/hadoop/data/datanode &&
        hdfs datanode
      "

  datanode2:
    image: apache/hadoop:3.3.6
    container_name: datanode2
    hostname: datanode2
    networks:
      - hadoop-net
    ports:
      - "9865:9864"
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - datanode2_data:/opt/hadoop/data/datanode
    environment:
      - HADOOP_HOME=/opt/hadoop
    depends_on:
      - namenode
    command: >
      bash -c "
        sleep 30 &&
        mkdir -p /opt/hadoop/data/datanode &&
        hdfs datanode
      "

  datanode3:
    image: apache/hadoop:3.3.6
    container_name: datanode3
    hostname: datanode3
    networks:
      - hadoop-net
    ports:
      - "9866:9864"
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - datanode3_data:/opt/hadoop/data/datanode
    environment:
      - HADOOP_HOME=/opt/hadoop
    depends_on:
      - namenode
    command: >
      bash -c "
        sleep 30 &&
        mkdir -p /opt/hadoop/data/datanode &&
        hdfs datanode
      "

  spark-master:
    image: apache/spark-py:latest
    container_name: spark-master
    hostname: spark-master
    networks:
      - hadoop-net
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./scripts:/scripts
      - ./data:/data
      - ./config/core-site.xml:/opt/spark/conf/core-site.xml
      - ./config/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml
    depends_on:
      - namenode
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker-1:
    image: apache/spark-py:latest
    user: "0:0"
    container_name: spark-worker-1
    hostname: spark-worker-1
    networks:
      - hadoop-net
    ports:
      - "8081:8081"
    volumes:
      - ./scripts:/scripts
      - ./data:/data
      - ./config/core-site.xml:/opt/spark/conf/core-site.xml
      - ./config/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-worker-2:
    image: apache/spark-py:latest
    user: "0:0"
    container_name: spark-worker-2
    hostname: spark-worker-2
    networks:
      - hadoop-net
    ports:
      - "8082:8081"
    volumes:
      - ./scripts:/scripts
      - ./data:/data
      - ./config/core-site.xml:/opt/spark/conf/core-site.xml
      - ./config/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

networks:
  hadoop-net:
    driver: bridge

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  datanode3_data: